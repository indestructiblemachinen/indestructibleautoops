# =============================================================================
# SuperAI Platform — Standalone Extraction Manifest
# =============================================================================
apiVersion: gl.platform.v1
kind: ExtractionManifest
metadata:
  name: superai-platform-extraction
  version: "1.0.0"

spec:
  source:
    monorepo: "indestructibleautoops"
    path: "superai-platform/"

  target:
    repository: "https://github.com/indestructibleorg/indestructibleeco"
    path: "platforms/superai-platform"
    branch: "main"

  extraction_steps:
    - step: 1
      action: "Copy platform directory"
      command: "cp -r superai-platform/ <target>/platforms/superai-platform/"

    - step: 2
      action: "Verify no cross-platform imports"
      command: "grep -r 'from govops' src/ || grep -r 'from seccompops' src/ || echo 'CLEAN'"

    - step: 3
      action: "Install dependencies"
      command: "pip install -e '.[dev]'"

    - step: 4
      action: "Run tests"
      command: "pytest tests/"

    - step: 5
      action: "Build container"
      command: "docker build -f Dockerfile.prod -t superai-platform:latest ."

  verification:
    - "All tests pass independently"
    - "Docker image builds successfully"
    - "No references to sibling platforms"
    - "API endpoints respond correctly"
