# =============================================================================
# SuperAI Platform — Platform Identity Manifest
# =============================================================================
apiVersion: gl.platform.v1
kind: PlatformManifest
metadata:
  name: superai-platform
  displayName: "Super AI Operations Platform"
  glName: "gl.ai.superai-platform"
  version: "1.0.0"
  created: "2026-02-21T00:00:00Z"
  owner: IndestructibleAutoOps
  team: "AI Operations Team"

spec:
  description: |
    Cloud-native AI operations platform with quantum computing integration,
    full-stack ML pipelines, vector database management, and scientific computing.

  type: microservice
  status: active
  language: python
  runtime: python3.11

  # Microservice identity (decoupled, no cross-platform deps)
  isolation:
    level: complete
    cross_platform_dependencies: none
    data_ownership: exclusive
    api_boundary: strict

  # Extraction target for standalone deployment
  extraction:
    target_repo: "https://github.com/indestructibleorg/indestructibleeco"
    target_path: "platforms/superai-platform"
    standalone_ready: true

  components:
    core:
      - name: ai_engine
        type: ml_inference
        description: "TensorFlow, PyTorch, Transformers, LangChain ML pipeline orchestration"
      - name: quantum_engine
        type: quantum_computing
        description: "Qiskit-based quantum circuit execution, hybrid classical-quantum algorithms"
      - name: scientific_engine
        type: scientific_computing
        description: "NumPy, SciPy, Pandas-based analysis and visualization pipelines"
      - name: vector_db
        type: vector_storage
        description: "ChromaDB, Pinecone, FAISS vector embedding management"
      - name: artifact_converter
        type: data_processing
        description: "Multi-format document parsing and generation"

  ports:
    api: 8090
    metrics: 9090

  infrastructure:
    database: postgresql-16
    cache: redis-7
    search: elasticsearch-8
    queue: rabbitmq-3
    monitoring: prometheus
    tracing: jaeger
    container: docker
    orchestration: kubernetes
