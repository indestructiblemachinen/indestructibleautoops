# Auto-Fix Workflow
# Automatically detects issues, applies fixes, and creates signed PRs

name: Auto-Fix Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    types: [opened, synchronize, reopened]
  schedule:
    - cron: '0 */6 * * *'  # Every 6 hours
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write
  issues: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  L1-detect:
    name: Detect Issues
    runs-on: ubuntu-latest
    outputs:
      violations_found: ${{ steps.scan.outputs.violations }}
      violation_types: ${{ steps.scan.outputs.types }}
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          
      - name: Run governance enforcement
        id: scan
        env:
          LOG_LEVEL: INFO
        run: |
          python ecosystem/enforce.py --audit > scan_report.json 2>&1 || true
          
          violations=$(jq '.violations | length' scan_report.json 2>/dev/null || echo "0")
          types=$(jq -r '.violations[].type' scan_report.json 2>/dev/null | sort -u | jq -R -s -c 'split("\n")[:-1]' || echo "[]")
          
          echo "violations=$violations" >> $GITHUB_OUTPUT
          echo "types=$types" >> $GITHUB_OUTPUT
          
          echo "Violations found: $violations"
          
      - name: Upload scan results
        uses: actions/upload-artifact@v4
        with:
          name: scan-results
          path: scan_report.json
          retention-days: 30

  L2-analyze:
    name: Analyze Issues
    needs: L1-detect
    if: needs.L1-detect.outputs.violations_found != '0'
    runs-on: ubuntu-latest
    outputs:
      fixable_issues: ${{ steps.analyze.outputs.fixable }}
      auto_fix_count: ${{ steps.analyze.outputs.auto_fix_count }}
      
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          
      - name: Download scan results
        uses: actions/download-artifact@v4
        with:
          name: scan-results
          
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          
      - name: Analyze violations
        id: analyze
        run: |
          # Parse violations from scan report
          if [ -f scan_report.json ]; then
            violations=$(jq '.violations | length' scan_report.json 2>/dev/null || echo "0")
            fixable=$(jq '[.violations[] | select(.severity != "CRITICAL")] | length' scan_report.json 2>/dev/null || echo "0")
            
            cat > analysis.json << EOF
            {
              "total_violations": $violations,
              "fixable": $fixable,
              "auto_fix_count": $fixable,
              "violations": []
            }
            EOF
          else
            echo '{"total_violations":0,"fixable":0,"auto_fix_count":0,"violations":[]}' > analysis.json
          fi
          
          fixable=$(jq '.fixable' analysis.json)
          auto_fix_count=$(jq '.auto_fix_count' analysis.json)
          
          echo "fixable=$fixable" >> $GITHUB_OUTPUT
          echo "auto_fix_count=$auto_fix_count" >> $GITHUB_OUTPUT
          
      - name: Upload analysis
        uses: actions/upload-artifact@v4
        with:
          name: violation-analysis
          path: analysis.json
          retention-days: 30

  L3-autofix:
    name: Apply Auto-Fixes
    needs: L2-analyze
    if: needs.L2-analyze.outputs.auto_fix_count != '0'
    runs-on: ubuntu-latest
    outputs:
      fixes_applied: ${{ steps.fix.outputs.count }}
      
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          
      - name: Download analysis
        uses: actions/download-artifact@v4
        with:
          name: violation-analysis
          
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          
      - name: Apply fixes
        id: fix
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Run enforce.py with auto-fix enabled
          python ecosystem/enforce.py --auto-fix --json --output fix_report.json 2>&1 || true
          
          # Count applied fixes
          if [ -f fix_report.json ]; then
            fixes=$(jq '.fixed_count // 0' fix_report.json 2>/dev/null || echo "0")
          else
            fixes="0"
          fi
          echo "count=$fixes" >> $GITHUB_OUTPUT
          
      - name: Upload fix report
        uses: actions/upload-artifact@v4
        with:
          name: auto-fix-report
          path: fix_report.json
          retention-days: 30

  L4-create-pr:
    name: Create Signed PR
    needs: [L2-analyze, L3-autofix]
    if: github.event_name != 'pull_request' && needs.L3-autofix.outputs.fixes_applied != '0'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          
      - name: Download fix report
        uses: actions/download-artifact@v4
        with:
          name: auto-fix-report
          
      - name: Generate PR summary
        id: summary
        run: |
          # Generate PR summary from fix report
          cat > pr_summary.md << 'EOF'
          ## 🤖 Automated Governance Fixes
          
          This PR was automatically generated by the Auto-Fix Pipeline.
          
          ### Changes Applied
          - Applied automated fixes for governance violations
          
          ### Verification
          - [ ] Review the changes
          - [ ] Run tests locally
          - [ ] Approve and merge
          
          ---
          *Generated by Auto-Fix Pipeline*
          EOF
          
      - name: Create pull request
        uses: peter-evans/create-pull-request@v6
        with:
          title: '[AutoFix] Governance violations run #${{ github.run_number }}'
          body-path: pr_summary.md
          branch: auto-fix/${{ github.run_id }}-${{ github.run_attempt }}
          labels: |
            auto-fix
            governance
          commit-message: |
            [AutoFix] Apply governance fixes
            
            This commit was automatically generated by the Auto-Fix Pipeline.
            
            Co-authored-by: MNGA Auto-Fix <bot@machine-native-ops>
          signoff: true
          
      - name: Create issue on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: 'Auto-Fix Pipeline Failed',
              body: 'The auto-fix pipeline failed. Please check the workflow logs for details.',
              labels: ['bug', 'auto-fix']
            })

  L5-verify:
    name: Verify PR
    needs: L4-create-pr
    if: success()
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          
      - name: Run validation
        run: |
          python ecosystem/enforce.py --audit --strict
          
      - name: Comment on PR
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            if (pr) {
              const comment = '✅ Auto-fix PR verification completed successfully.';
              github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr.number,
                body: comment
              });
            }